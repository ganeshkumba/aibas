{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto; padding: 2.5rem;">
  <h2 style="margin-bottom: 0.5rem;">Register New Entity</h2>
  <div class="small" style="font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 2rem;">
    Business Profile & Compliance Details
  </div>

  <form method="post">
    {% csrf_token %}
    
    <div style="margin-bottom: 1.5rem;">
      {{ form.as_p }}
    </div>

    <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-size: 1rem; margin-top: 1rem;">Foundation Entity</button>
  </form>
</div>

<style>
  /* Fix as_p rendering to match our theme */
  form p { margin-bottom: 1.25rem; }
  form label { display: block; font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.25rem; }
  form input, form select, form textarea { margin-top: 0; }
</style>
{% endblock %}
