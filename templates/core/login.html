{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="max-width: 440px; margin: 4rem auto;">
  <div class="card-header" style="justify-content: center; padding: 1.5rem;">
    <h2 style="font-size: 1.25rem;">Sign in to The Ledger</h2>
  </div>

  <div class="card-body" style="padding: 2rem;">
    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="alert-gh" style="background: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.4); color: var(--danger); margin-bottom: 2rem;">
            {{ form.non_field_errors }}
        </div>
        {% endif %}

        <div style="margin-bottom: 1.5rem;">
            <label>Email address</label>
            {{ form.username }}
        </div>

        <div style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Password</label>
                <a href="#" style="font-size: 0.75rem; color: var(--gh-blue); text-decoration: none;">Forgot password?</a>
            </div>
            {{ form.password }}
        </div>

        <button type="submit" class="btn" style="width: 100%; justify-content: center; padding: 10px;">Sign in</button>
    </form>
  </div>

  <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; border: 1px solid var(--border-default); border-radius: 6px; padding: 1.25rem;">
    New to The Ledger? 
    <a href="{% url 'core:signup' %}" style="color: var(--gh-blue); text-decoration: none;">Create an account</a>.
  </div>
</div>
{% endblock %}
